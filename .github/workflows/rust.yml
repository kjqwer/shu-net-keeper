name: Release

on:
  push:
    branches: [ "main" ]
    # 监听 Tag 推送：只有推送类似 v1.0.0 的 tag 时，才会触发最后的 Release 发布
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        
      - name: Clippy
        run: cargo clippy -- -D warnings
        
      - name: Fmt
        run: cargo fmt --all -- --check

  build:
    name: Build Binaries
    needs: check # 必须等待 check 成功后才开始编译
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # 为 Linux ARM64 指定链接器
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # 将编译好的二进制文件重命名，带上平台后缀，防止在 Release 中互相覆盖
      - name: Rename binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/shu-net-keeper target/${{ matrix.target }}/release/shu-net-keeper-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/shu-net-keeper.exe target/${{ matrix.target }}/release/shu-net-keeper-${{ matrix.target }}.exe

      # 只上传重命名后的二进制文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/shu-net-keeper-${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build # 必须等待所有平台的 build 任务完成
    if: startsWith(github.ref, 'refs/tags/v') # 只有推送 Tag 时才执行此任务
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Action 创建 Release 和上传文件的权限
      
    steps:
      # 下载上面所有构建任务上传的 artifacts，并将它们合并到一个目录中
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # 将 artifacts 目录下的所有文件发布到 GitHub Releases
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true # 自动生成 release 变更日志
